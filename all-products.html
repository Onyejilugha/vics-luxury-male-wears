<div class="cart">
  <h2>Your Cart</h2>
  <div id="cartItems"></div>
  <p><strong>Total: ₦<span id="total">0</span></strong></p>
  <button class="checkout" id="checkout">Confirm Order on WhatsApp</button>
</div>

  <p>&copy; 2026 Vic's Luxury Male Wears</p>
</footer>

<script>
const cart=[];
const cartItems=document.getElementById("cartItems");
const totalEl=document.getElementById("total");

document.querySelectorAll(".add").forEach(btn=>{
  btn.onclick=()=>{
    const p=btn.parentElement;
    const name=p.dataset.name;
    const price=Number(p.dataset.price);
    const size=p.querySelector(".size").value;
    const key=name+size;

    const item=cart.find(i=>i.key===key);
    if(item) item.qty++;
    else cart.push({key,name,size,price,qty:1});
    render();
  }
});

function render(){
  cartItems.innerHTML="";
  let total=0;
  cart.forEach((i,index)=>{
    total+=i.price*i.qty;
    cartItems.innerHTML+=`
      <div class="cart-item">
        <span>${i.name} (${i.size}) x ${i.qty}</span>
        <span>
          <button onclick="changeQty(${index},-1)">-</button>
          <button onclick="changeQty(${index},1)">+</button>
          <button onclick="removeItem(${index})">x</button>
        </span>
      </div>
    `;
  });
  totalEl.textContent=total.toLocaleString();
}

function changeQty(i,val){
  cart[i].qty+=val;
  if(cart[i].qty<=0) cart.splice(i,1);
  render();
}

function removeItem(i){
  cart.splice(i,1);
  render();
}

document.getElementById("checkout").onclick=()=>{
  if(!cart.length) return alert("Cart is empty");
  let msg="Hello, I want to order:%0A";
  cart.forEach(i=>{
    msg+=`- ${i.name} (${i.size}) x ${i.qty} = ₦${(i.price*i.qty).toLocaleString()}%0A`;
  });
  msg+=`%0ATotal: ₦${totalEl.textContent}`;
  window.open(`https://wa.me/09161267396?text=${msg}`,"_blank");
};
</script>
